        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        /* This is a game, not a document: a mouse-drag or double-click that
           starts on the canvas / bare board isn't caught by any pointer
           handler, so the browser runs its native text/element selection and
           highlights the viewport and controls. Suppress selection globally
           (it inherits, so the canvas and touch controls are covered too),
           plus the iOS long-press callout and tap highlight. */
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        display: grid;
        place-items: center;
        height: 100%;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
