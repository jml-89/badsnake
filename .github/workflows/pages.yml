name: Deploy to GitHub Pages

# Production deploy. Publishes main's build to the ROOT of the `gh-pages` branch.
# PR previews (see pr-preview.yml) live in the pr-preview/ subfolder of the same
# branch, so this deploy must NOT wipe that folder — hence clean-exclude.
#
# ONE-TIME SETUP (repo Settings -> Pages): set Source to
# "Deploy from a branch" -> branch `gh-pages` -> folder `/ (root)`.
# The site stays at https://jml-89.github.io/badsnake/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the built site to the gh-pages branch

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-preview/
